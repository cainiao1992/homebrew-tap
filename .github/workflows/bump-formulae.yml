name: Bump formulae

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch: # allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump-formulae:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Bump formulae and casks
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          CHANGED=()
          for formula in Formula/*.rb; do
            name=$(basename "$formula" .rb)
            echo "::group::Checking formula $name"
            json=$(brew livecheck --json --quiet "$name")
            outdated=$(echo "$json" | jq -r '.[0].version.outdated // false')
            if [ "$outdated" = "true" ]; then
              latest=$(echo "$json" | jq -r '.[0].version.latest')
              echo "New version available for $name: ${latest}"
              CHANGED+=("formula:${name}:${latest}")
            fi
            echo "::endgroup::"
          done

          for cask in Casks/*.rb; do
            [ -e "$cask" ] || continue
            name=$(basename "$cask" .rb)
            echo "::group::Checking cask $name"
            json=$(brew livecheck --cask --json --quiet "$name")
            outdated=$(echo "$json" | jq -r '.[0].version.outdated // false')
            if [ "$outdated" = "true" ]; then
              latest=$(echo "$json" | jq -r '.[0].version.latest')
              echo "New version available for $name: ${latest}"
              CHANGED+=("cask:${name}:${latest}")
            fi
            echo "::endgroup::"
          done

          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "All formulae and casks are up to date."
            exit 0
          fi

          echo "Packages to update: ${CHANGED[*]}"

          FAILED=()
          for entry in "${CHANGED[@]}"; do
            kind="${entry%%:*}"
            rest="${entry#*:}"
            name="${rest%%:*}"
            version="${rest#*:}"
            echo "::group::Bumping $kind $name to $version"
            if [ "$kind" = "cask" ]; then
              if ! brew bump-cask-pr \
                --no-fork \
                --no-browse \
                --no-audit \
                --write-only \
                --version="$version" \
                "$name"; then
                FAILED+=("$name")
              fi
            elif ! brew bump-formula-pr \
              --no-fork \
              --no-browse \
              --no-audit \
              --write-only \
              --version="$version" \
              "$name"; then
              FAILED+=("$name")
            fi
            echo "::endgroup::"
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed to bump: ${FAILED[*]}"
            exit 1
          fi

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          names=()
          for entry in "${CHANGED[@]}"; do
            rest="${entry#*:}"
            names+=("${rest%%:*}")
          done

          git add -A Formula Casks
          git commit -m "auto-bump: update ${names[*]}"
          git push origin main
