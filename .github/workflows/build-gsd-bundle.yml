name: Build GSD bundle

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for new version
        id: check
        run: |
          CURRENT=$(grep '^  version "' Formula/gsd-2.rb | head -1 | sed 's/.*"\(.*\)".*/\1/')
          LATEST=$(curl -sL https://api.github.com/repos/gsd-build/gsd-2/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
          - os: macos-13
            platform: darwin-x64
          - os: ubuntu-latest
            platform: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install gsd-pi
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          mkdir gsd-bundle
          cd gsd-bundle
          npm init -y
          npm install "gsd-pi@${VERSION}" --ignore-scripts

      - name: Run postinstall scripts
        run: |
          cd gsd-bundle
          npm rebuild

      - name: Prune foreign native binaries
        run: |
          PLATFORM="${{ matrix.platform }}"
          cd gsd-bundle
          case "$PLATFORM" in
            darwin-arm64) KEEP="arm64.darwin|darwin.arm64|darwin-arm64" ;;
            darwin-x64)   KEEP="x64.darwin|darwin.x64|darwin-x64" ;;
            linux-x64)    KEEP="x64.linux|linux.x64|linux-x64" ;;
          esac
          find node_modules -name "*.node" 2>/dev/null | while read -r f; do
            dir=$(dirname "$f")
            if ! echo "$dir" | grep -qE "$KEEP"; then
              rm -rf "$dir"
            fi
          done
          for d in node_modules/@img/sharp-*/; do
            [ -d "$d" ] && ! echo "$d" | grep -qE "$KEEP" && rm -rf "$d"
          done
          for d in node_modules/gsd-pi/dist/web/standalone/node_modules/@img/sharp-*/; do
            [ -d "$d" ] && ! echo "$d" | grep -qE "$KEEP" && rm -rf "$d"
          done
          for d in node_modules/gsd-pi/dist/web/standalone/node_modules/node-pty/prebuilds/*/; do
            [ -d "$d" ] && ! echo "$d" | grep -qE "$KEEP" && rm -rf "$d"
          done

      - name: Create bundle archive
        run: |
          PLATFORM="${{ matrix.platform }}"
          VERSION="${{ needs.check.outputs.version }}"
          tar czf "gsd-${VERSION}-${PLATFORM}.tar.gz" -C gsd-bundle .
          echo "archive=gsd-${VERSION}-${PLATFORM}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsd-bundle-${{ matrix.platform }}
          path: "gsd-*.tar.gz"

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bundles
          pattern: gsd-bundle-*
          merge-multiple: true

      - name: Compute SHA256
        id: sha
        run: |
          ls -la bundles/
          for f in bundles/gsd-*.tar.gz; do
            name=$(basename "$f")
            sha=$(shasum -a 256 "$f" | cut -d' ' -f1)
            echo "${name}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Update formula
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          SHAS="${{ steps.sha.outputs }}"
          DARWIN_ARM=$(echo "$SHAS" | grep -o 'gsd-.*darwin-arm64.tar.gz=[a-f0-9]*' | cut -d= -f2)
          DARWIN_X64=$(echo "$SHAS" | grep -o 'gsd-.*darwin-x64.tar.gz=[a-f0-9]*' | cut -d= -f2)
          LINUX_X64=$(echo "$SHAS" | grep -o 'gsd-.*linux-x64.tar.gz=[a-f0-9]*' | cut -d= -f2)

          cat > Formula/gsd-2.rb << 'FORMULA_HEAD'
          class Gsd2 < Formula
            desc "Meta-prompting, context engineering and spec-driven development system for AI agents"
            homepage "https://github.com/gsd-build/gsd-2"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            depends_on "node@24"

            livecheck do
              url "https://github.com/gsd-build/gsd-2"
              strategy :github_latest
            end

            on_macos do
              on_arm do
                url "https://github.com/cainiao1992/homebrew-tap/releases/download/gsd-vVERSION_PLACEHOLDER/gsd-VERSION_PLACEHOLDER-darwin-arm64.tar.gz"
                sha256 "DARWIN_ARM_SHA"
              end
              on_intel do
                url "https://github.com/cainiao1992/homebrew-tap/releases/download/gsd-vVERSION_PLACEHOLDER/gsd-VERSION_PLACEHOLDER-darwin-x64.tar.gz"
                sha256 "DARWIN_X64_SHA"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/cainiao1992/homebrew-tap/releases/download/gsd-vVERSION_PLACEHOLDER/gsd-VERSION_PLACEHOLDER-linux-x64.tar.gz"
                sha256 "LINUX_X64_SHA"
              end
            end

            def install
              libexec.install Dir["*"]
              bin.install_symlink libexec/"node_modules/.bin/gsd" => "gsd"
              bin.install_symlink libexec/"node_modules/.bin/gsd-cli" => "gsd-cli"
              bin.install_symlink libexec/"node_modules/.bin/gsd-pi" => "gsd-pi"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/gsd --version")
            end
          end
          FORMULA_HEAD

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" Formula/gsd-2.rb
          sed -i "s/DARWIN_ARM_SHA/${DARWIN_ARM}/g" Formula/gsd-2.rb
          sed -i "s/DARWIN_X64_SHA/${DARWIN_X64}/g" Formula/gsd-2.rb
          sed -i "s/LINUX_X64_SHA/${LINUX_X64}/g" Formula/gsd-2.rb

      - name: Create release and push formula
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gsd-2.rb
          git commit -m "gsd-2: update to ${VERSION}"
          git tag "gsd-v${VERSION}"
          git push origin main --tags

          gh release create "gsd-v${VERSION}" bundles/gsd-*.tar.gz \
            --title "GSD ${VERSION}" \
            --notes "Pre-built bundle for gsd-pi ${VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
